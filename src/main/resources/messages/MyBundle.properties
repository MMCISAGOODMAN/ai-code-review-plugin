# Plugin name
plugin.name=AI Code Reviewer

# Configuration labels
configuration.title=AI Configuration
api.key.label=AI API Key
api.key.comment=Enter your AI service API key. Supports OpenAI, Claude, and other compatible APIs.
endpoint.label=AI Endpoint URL
endpoint.comment=Enter the AI service endpoint URL (e.g., https://api.openai.com/v1/chat/completions)
model.label=AI Model Name
model.comment=Enter any AI model name (e.g., gpt-3.5-turbo, claude-3-opus, llama-2-70b, etc.)
language.label=Review Language
language.comment=Select the language for code review feedback.

# Error messages
error.api.key.required=AI API key cannot be empty
error.api.key.invalid=API key format appears invalid. Please check your API key.
error.endpoint.required=AI endpoint cannot be empty
error.endpoint.invalid=Endpoint must be a valid URL starting with http:// or https://
error.endpoint.format=Endpoint should point to a chat completion API (ending with /v1/chat/completions)
error.model.required=AI model cannot be empty
error.model.invalid=Please enter a valid model name
error.endpoint.invalid=Endpoint must be a valid URL starting with http:// or https://
error.endpoint.format=Endpoint should point to an AI service API (contains: chat/completions, completions, generate, or invoke)
error.authentication.failed=Authentication failed. Please check your API key and model configuration.
error.rate.limit=Rate limit reached. Please wait before trying again.
error.model.not.found=Model not found. Please verify the model name in settings.
error.network.error=Network error: {0}
error.configuration.error=Configuration error: {0}

# Action messages
message.copied.to.clipboard=Copied to clipboard!
message.no.selection=Please select some Java code first.
message.loading=Loading...

# UI labels
label.issues.count=Found {0} issues (Critical: {1}, Warnings: {2}, Info: {3})
button.apply.suggestion=Apply Suggestion
button.copy.to.clipboard=Copy to Clipboard
button.clear.results=Clear Results

# 多语言支持 - 错误消息会根据用户选择的语言自动显示


