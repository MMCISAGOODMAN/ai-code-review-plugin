# Plugin name
plugin.name=AI代码审查器

# Configuration labels
api.key.label=AI API密钥
api.key.comment=输入您的AI服务API密钥。支持OpenAI、Claude和其他兼容的API。
endpoint.label=AI端点URL
endpoint.comment=输入AI服务端点URL（例如：https://api.openai.com/v1/chat/completions）
model.label=AI模型名称
model.comment=输入任何AI模型名称（例如：gpt-3.5-turbo、claude-3-opus、llama-2-70b等）
language.label=审查语言
language.comment=选择代码审查反馈的语言。

# Error messages
error.api.key.required=AI API密钥不能为空
error.endpoint.required=AI端点不能为空
error.model.required=AI模型不能为空
error.authentication.failed=认证失败，请检查您的API密钥和模型配置
error.rate.limit=已达到速率限制，请稍后再试
error.model.not.found=模型未找到，请验证模型名称
error.network.error=网络错误：{0}
error.configuration.error=配置错误：{0}

# Action messages
message.copied.to.clipboard=已复制到剪贴板！
message.no.selection=请先选择一些Java代码。
message.loading=加载中...

# UI labels
label.issues.count=发现 {0} 个问题（严重：{1}，警告：{2}，信息：{3}）
button.apply.suggestion=应用建议
button.copy.to.clipboard=复制到剪贴板
button.clear.results=清除结果